<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>yes-chef · sign in</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="centered">
  <main class="card login-card">
    <h1 class="brand">
      <span class="brand-name">🍽️ yes-chef</span>
      <span class="brand-tag">Your Smart Menu Planner</span>
    </h1>
    <p class="muted">Sign in to plan and log meals.</p>

    <form id="login-form">
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required autofocus />
      </label>
      <button type="submit">Sign in</button>
      <p id="login-error" class="error" hidden></p>
    </form>

    <div id="oauth-block" hidden>
      <hr />
      <a class="btn-google" href="/auth/google">Continue with Google</a>
    </div>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const err  = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.hidden = true;
      const password = new FormData(form).get('password');
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        err.textContent = data.error || 'Sign-in failed';
        err.hidden = false;
        if (res.status === 429) {
          form.querySelector('button[type=submit]').disabled = true;
        }
      }
    });

    fetch('/auth/status').then(r => r.json()).then(s => {
      if (s.enabled) document.getElementById('oauth-block').hidden = false;
    }).catch(() => {});
  </script>
</body>
</html>
